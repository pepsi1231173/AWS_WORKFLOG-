name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: "0.134.3"
          extended: true

      - name: Build website
        run: hugo --minify --baseURL "https://pepsi1231173.github.io/AWS_WORKFLOG-/"

      - name: Fix absolute image paths for GitHub Pages
        run: |
          find public -type f \( -name "*.html" -o -name "*.xml" -o -name "*.json" \) -print0 \
            | xargs -0 sed -i \
              -e 's#="/images/#="/AWS_WORKFLOG-/images/#g' \
              -e "s#='/images/#='/AWS_WORKFLOG-/images/#g" \
              -e 's#=/images/#=/AWS_WORKFLOG-/images/#g'

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: true
